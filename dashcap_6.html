<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dash's Cap — Meritus Capital</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f6fa;min-height:100vh}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 60%,#1e1b4b 100%)}
.login-box{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#6366f1,#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;margin:0 auto 16px}
.login-brand{font-size:22px;font-weight:800;text-align:center;color:#1a1d2e;margin-bottom:4px}
.login-sub{font-size:13px;color:#6b7280;text-align:center;margin-bottom:28px}
.lfield{margin-bottom:14px}
.lfield label{font-size:11px;color:#6b7280;display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.lfield input{width:100%;border-radius:10px;border:1px solid #e5e7ef;background:#f9fafb;color:#1a1d2e;padding:12px 14px;font-size:14px;font-family:inherit}
.lfield input:focus{outline:none;border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.btn-login{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-login:hover{opacity:.9}
.login-err{font-size:13px;color:#e34948;text-align:center;margin-top:10px;min-height:18px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;background:#1e1b4b;flex-shrink:0;display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.sidebar-brand{font-size:16px;font-weight:800;color:#fff;display:flex;align-items:center;gap:10px}
.brand-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.brand-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:3px;padding-left:42px}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;padding:10px 8px 4px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,.55);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;border:1px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(99,102,241,.25);color:#fff;border-color:rgba(99,102,241,.35)}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sidebar-footer{padding:14px 10px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
.user-row{display:flex;align-items:center;gap:10px;padding:8px}
.user-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:13px;font-weight:500;color:#fff}
.user-role{font-size:11px;color:rgba(255,255,255,.4)}
.btn-sair{width:100%;margin-top:8px;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;font-family:inherit}
.btn-sair:hover{background:rgba(227,73,72,.2);color:#e34948;border-color:rgba(227,73,72,.3)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.frame-container{flex:1;position:relative}
.dash-frame{position:absolute;inset:0;width:100%;height:100%;border:none;display:none}
.dash-frame.active{display:block}
.frame-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#f5f6fa;z-index:10;flex-direction:column;gap:14px}
.spinner{width:40px;height:40px;border:3px solid #e5e7ef;border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:#6b7280;font-family:inherit}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">CAP</div>
      <div class="login-brand">Dash's Cap</div>
      <div class="login-sub">Meritus Capital &middot; Painel Unificado</div>
      <div class="lfield"><label>Usu&#225;rio</label><input type="text" id="l-user" placeholder="Seu usu&#225;rio" autocomplete="username"/></div>
      <div class="lfield"><label>Senha</label><input type="password" id="l-pass" placeholder="Sua senha" autocomplete="current-password"/></div>
      <button class="btn-login" onclick="fazerLogin()">Entrar no painel</button>
      <div class="login-err" id="login-err"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="app" style="display:none">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-brand"><div class="brand-icon">CAP</div>Dash's Cap</div>
      <div class="brand-sub">Meritus Capital</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-lbl">Dashboards</div>
      <div class="nav-item active" id="nav-confirmacoes" onclick="irPara('confirmacoes')">
        <span class="nav-icon">&#10003;</span>Confirma&#231;&#245;es
      </div>
      <div class="nav-item" id="nav-reembolsos" onclick="irPara('reembolsos')">
        <span class="nav-icon">&#128176;</span>Reembolsos
      </div>
      <div class="nav-item" id="nav-tentativas" onclick="irPara('tentativas')">
        <span class="nav-icon">&#128203;</span>Tentativas
      </div>
      <div class="nav-lbl">Gest&#227;o</div>
      <div class="nav-item" id="nav-ra" onclick="irPara('ra')">
        <span class="nav-icon">&#128221;</span>R.A e Auditoria
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-av" id="user-av">A</div>
        <div><div class="user-name" id="user-name">&#8212;</div><div class="user-role">Meritus Capital</div></div>
      </div>
      <button class="btn-sair" onclick="fazerLogout()">Sair da conta</button>
    </div>
  </div>

  <div class="main">
    <div class="frame-container">
      <div class="frame-loading" id="frame-loading">
        <div class="spinner"></div>
        <div class="loading-txt">Carregando dashboard...</div>
      </div>
      <iframe class="dash-frame active" id="frame-confirmacoes" title="Confirma&#231;&#245;es"></iframe>
      <iframe class="dash-frame" id="frame-reembolsos" title="Reembolsos"></iframe>
      <iframe class="dash-frame" id="frame-tentativas" title="Tentativas"></iframe>
      <iframe class="dash-frame" id="frame-ra" title="R.A e Auditoria"></iframe>
    </div>
  </div>
</div>

function b64ToHtml(b64){
  var binary=atob(b64);
  var bytes=new Uint8Array(binary.length);
  for(var i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

function fazerLogin(){

  if(found){
    usuarioAtual=found;
    sessionStorage.setItem("dashcap-session",JSON.stringify(found));
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app-screen").style.display="flex";
    document.getElementById("user-av").textContent=found.nome.charAt(0).toUpperCase();
    document.getElementById("user-name").textContent=found.nome;
    carregarFrame("confirmacoes");
  } else {
    document.getElementById("login-err").textContent="Usu\u00e1rio ou senha incorretos.";
  }
}

function fazerLogout(){
  sessionStorage.removeItem("dashcap-session");
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("app-screen").style.display="none";
  document.getElementById("l-user").value="";
  document.getElementById("l-pass").value="";
  Object.keys(framesCarregados).forEach(function(k){
    var f=document.getElementById("frame-"+k);
    if(f){f.src="about:blank";}
  });
  framesCarregados={};
}

document.getElementById("l-pass").addEventListener("keydown",function(e){if(e.key==="Enter")fazerLogin();});
document.getElementById("l-user").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("l-pass").focus();});

function irPara(pagina){
  document.querySelectorAll(".nav-item").forEach(function(el){el.classList.remove("active");});
  document.getElementById("nav-"+pagina).classList.add("active");
  document.querySelectorAll(".dash-frame").forEach(function(el){el.classList.remove("active");});
  document.getElementById("frame-"+pagina).classList.add("active");
  if(!framesCarregados[pagina]) carregarFrame(pagina);
}

function carregarFrame(pagina){
  var loading=document.getElementById("frame-loading");
  loading.style.display="flex";
  var frame=document.getElementById("frame-"+pagina);
  var html=b64ToHtml(B64[pagina]);
  var blob=new Blob([html],{type:"text/html;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  frame.onload=function(){
    loading.style.display="none";
    framesCarregados[pagina]=true;
    URL.revokeObjectURL(url);
  };
  frame.src=url;
}

(function(){
  var s=sessionStorage.getItem("dashcap-session");
  if(s){
    try{
      usuarioAtual=JSON.parse(s);
      document.getElementById("login-screen").style.display="none";
      document.getElementById("app-screen").style.display="flex";
      document.getElementById("user-av").textContent=usuarioAtual.nome.charAt(0).toUpperCase();
      document.getElementById("user-name").textContent=usuarioAtual.nome;
      carregarFrame("confirmacoes");
    }catch(e){sessionStorage.removeItem("dashcap-session");}
  }
})();
</script>
